name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema:
    name: Schema conformance (examples)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dev tooling
        run: npm install --no-audit --no-fund

      - name: Validate example corpus against the schema
        run: npm run validate:examples

  js:
    name: JS workspaces (SDK, adapters, web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Single install at the workspace root. This links the workspaces and runs
      # the SDK's `prepare` script, building packages/ts-sdk/dist so dependents
      # (adapters, web) resolve a built @opendeviceio/sdk.
      - name: Install workspace dependencies
        run: npm ci || npm install

      # Build the SDK explicitly before adapters/web so their steps always see
      # a fresh dist even if install-time prepare is skipped (e.g. cache reuse).
      - name: Build SDK
        run: npm run build -w @opendeviceio/sdk

      - name: Test SDK
        run: npm run test -w @opendeviceio/sdk

      - name: Test adapters
        run: npm run test -w @opendeviceio/adapters

      - name: Build web
        run: npm run build -w @opendeviceio/web

  genie:
    name: Genie importer (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genie
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest
